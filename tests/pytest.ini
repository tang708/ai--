[pytest]
testpaths = ./case

addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --alluredir=./report/json
    --clean-alluredir

markers =
    smoke: 冒烟测试（核心功能快速验证）
    p0: P0 级用例（核心业务流程）
    p1: P1 级用例（重要功能）
    p2: P2 级用例（边界条件）
    login: 登录相关
    register: 注册相关
    admin: 管理员功能
    core_flow: 核心业务链路

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S

console_output_style = count

minversion = 7.0
